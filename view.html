<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>B2B 회계 현황 뷰어</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500&display=swap');
:root{--bg:#0f1117;--bg2:#161822;--bg3:#1e2030;--bg4:#252840;--border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.12);--text:#e8eaf0;--text2:#8b8fa8;--text3:#555870;--accent:#6c8fff;--accent2:#4ecdc4;--green:#4ade80;--red:#f87171;--amber:#fbbf24;--purple:#a78bfa;--mono:'JetBrains Mono',monospace;--sans:'Noto Sans KR',sans-serif;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;}
.header{background:var(--bg2);border-bottom:1px solid var(--border);padding:16px 32px;display:flex;align-items:center;justify-content:space-between;}
.header-title{font-size:16px;font-weight:700;}
.header-sub{font-size:11px;color:var(--text3);margin-top:2px;}
.readonly-badge{background:rgba(251,191,36,.15);border:1px solid rgba(251,191,36,.3);color:var(--amber);font-size:11px;padding:3px 10px;border-radius:99px;}
.main{padding:28px 32px;max-width:1400px;margin:0 auto;}
.section{margin-bottom:32px;}
.section-title{font-size:14px;font-weight:500;color:var(--text2);margin-bottom:14px;display:flex;align-items:center;gap:8px;}
.section-title::before{content:'';width:3px;height:14px;background:var(--accent);border-radius:2px;}

/* 연도 요약 */
.year-summary{background:var(--bg2);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:24px;}
.year-summary table{width:100%;border-collapse:collapse;font-size:12px;}
.year-summary th{padding:9px 14px;text-align:right;font-size:10px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;border-bottom:1px solid var(--border);background:var(--bg3);white-space:nowrap;}
.year-summary th:first-child{text-align:left;}
.year-summary td{padding:10px 14px;text-align:right;border-bottom:0.5px solid var(--border);font-family:var(--mono);font-size:12px;color:var(--text2);white-space:nowrap;}
.year-summary td:first-child{text-align:left;font-family:var(--sans);font-weight:500;color:var(--text);}
.year-summary tr:last-child td{border-bottom:none;}
.ys-badge{display:inline-block;font-size:10px;font-weight:500;padding:1px 6px;border-radius:4px;margin-left:4px;}
.ys-up{background:rgba(74,222,128,.15);color:#4ade80;}.ys-dn{background:rgba(248,113,113,.12);color:#f87171;}

/* KPI */
.kpi-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:12px;margin-bottom:24px;}
@media(max-width:1000px){.kpi-grid{grid-template-columns:repeat(3,1fr);}}
.kpi{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:16px;position:relative;overflow:hidden;}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--kpi-color,var(--accent));}
.kpi-label{font-size:11px;color:var(--text2);margin-bottom:8px;}
.kpi-value{font-family:var(--mono);font-size:17px;font-weight:500;color:var(--kpi-color,var(--text));}
.kpi-sub{font-size:10px;color:var(--text3);margin-top:4px;}

/* 차트 */
.chart-grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px;}
.chart-grid-3{display:grid;grid-template-columns:2fr 1fr;gap:16px;margin-bottom:16px;}
@media(max-width:900px){.chart-grid-2,.chart-grid-3{grid-template-columns:1fr;}}
.chart-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:20px;}
.chart-title{font-size:13px;font-weight:500;margin-bottom:16px;color:var(--text);}
.chart-wrap{position:relative;}

/* 테이블 */
.table-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;overflow:hidden;}
.table-header{padding:14px 20px;border-bottom:1px solid var(--border);font-size:13px;font-weight:500;display:flex;justify-content:space-between;align-items:center;}
.tbl-wrap{overflow-x:auto;}
table.data{width:100%;border-collapse:collapse;font-size:12px;}
table.data th{padding:9px 12px;text-align:right;font-size:10px;color:var(--text3);font-weight:500;text-transform:uppercase;border-bottom:1px solid var(--border);background:var(--bg3);white-space:nowrap;}
table.data th:first-child{text-align:left;}
table.data td{padding:9px 12px;text-align:right;border-bottom:0.5px solid var(--border);font-family:var(--mono);font-size:12px;color:var(--text2);white-space:nowrap;}
table.data td:first-child{text-align:left;font-family:var(--sans);color:var(--text);font-weight:500;}
table.data tr:last-child td{border-bottom:none;}
table.data tr:hover td{background:rgba(255,255,255,.02);}
.pos{color:#4ade80!important;}.neg{color:#f87171!important;}.amb{color:#fbbf24!important;}

/* 사입 비율바 */
.ratio-wrap{display:flex;height:26px;border-radius:6px;overflow:hidden;margin:8px 0;}
.ratio-new{background:rgba(108,143,255,.7);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;color:#fff;}
.ratio-re{background:rgba(78,205,196,.7);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;color:#fff;}
.badge{display:inline-block;padding:1px 7px;border-radius:99px;font-size:10px;font-weight:500;}
.badge-blue{background:rgba(108,143,255,.15);color:#6c8fff;}
.updated{font-size:11px;color:var(--text3);}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:3px;}
</style>
</head>
<body>
<div class="header">
  <div>
    <div class="header-title">B2B 회계 현황</div>
    <div class="header-sub" id="headerSub"></div>
  </div>
  <div style="display:flex;align-items:center;gap:12px;">
    <span class="updated" id="updatedDate"></span>
    <span class="readonly-badge">읽기전용</span>
  </div>
</div>

<div class="main">

  <!-- 연도별 요약 -->
  <div class="section">
    <div class="section-title">연도별 매출 현황</div>
    <div class="year-summary" id="yearSummary"></div>
  </div>

  <!-- KPI -->
  <div class="section">
    <div class="section-title">전체 기간 핵심 지표</div>
    <div class="kpi-grid" id="kpiGrid"></div>
  </div>

  <!-- 차트 -->
  <div class="section">
    <div class="section-title">월별 추이</div>
    <div class="chart-grid-3">
      <div class="chart-card"><div class="chart-title">월별 영업이익</div><div class="chart-wrap" style="height:200px;"><canvas id="chartProfit"></canvas></div></div>
      <div class="chart-card"><div class="chart-title">플랫폼별 매출 비중</div><div class="chart-wrap" style="height:200px;"><canvas id="chartPlatform"></canvas></div></div>
    </div>
    <div class="chart-grid-2">
      <div class="chart-card"><div class="chart-title">매출 vs 지출 추이</div><div class="chart-wrap" style="height:200px;"><canvas id="chartRevExp"></canvas></div></div>
      <div class="chart-card"><div class="chart-title">마진율 추이</div><div class="chart-wrap" style="height:200px;"><canvas id="chartMargin"></canvas></div></div>
    </div>
  </div>

  <!-- 사입 분석 -->
  <div class="section">
    <div class="section-title">사입 분석 (신제품 vs 리오더)</div>
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px;" id="purchaseKpi"></div>
    <div class="chart-grid-2">
      <div class="chart-card"><div class="chart-title">신제품 vs 리오더 사입금액</div><div class="chart-wrap" style="height:200px;"><canvas id="chartPurchase"></canvas></div></div>
      <div class="chart-card">
        <div class="chart-title">전체 기간 사입 비율</div>
        <div style="padding:8px 0;" id="ratioBars"></div>
      </div>
    </div>
  </div>

  <!-- 월별 상세 테이블 -->
  <div class="section">
    <div class="section-title">월별 상세 내역</div>
    <div class="table-card">
      <div class="table-header"><span>월별 마감 보고서</span><span class="badge badge-blue" id="tableCount"></span></div>
      <div class="tbl-wrap">
        <table class="data">
          <thead><tr><th>연월</th><th>매출합계</th><th>오너클랜</th><th>도매꾹</th><th>쿠팡</th><th>지출-1</th><th>지출-2(사입)</th><th>영업이익</th><th>마진율</th><th>실재고</th><th>상품마진율</th></tr></thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>
    </div>
  </div>

</div>

const C={blue:'#6c8fff',teal:'#4ecdc4',green:'#4ade80',red:'#f87171',amber:'#fbbf24',purple:'#a78bfa'};
const charts={};

function fmt(n){if(n==null||isNaN(n))return'-';return Math.round(n).toLocaleString('ko-KR');}
function fmtM(n){if(n==null||isNaN(n))return'-';const a=Math.abs(n),s=n<0?'-':'';if(a>=1e8)return s+(a/1e8).toFixed(1)+'억';if(a>=1e4)return s+(a/1e4).toFixed(0)+'만';return s+a.toLocaleString();}
function fmtP(n){if(n==null||isNaN(n))return'-';return n.toFixed(1)+'%';}
function dc(id){if(charts[id]){charts[id].destroy();delete charts[id];}}
function mc(id,cfg){
  dc(id);const ctx=document.getElementById(id);if(!ctx)return;
  charts[id]=new Chart(ctx,{...cfg,options:{responsive:true,maintainAspectRatio:false,
    plugins:{legend:{display:false},tooltip:{backgroundColor:'#1e2030',borderColor:'rgba(255,255,255,.1)',borderWidth:1,titleColor:'#8b8fa8',bodyColor:'#e8eaf0'}},
    ...(cfg.type==='doughnut'?{}:{scales:{x:{grid:{color:'rgba(255,255,255,.04)'},ticks:{color:'#555870',font:{size:9}}},y:{grid:{color:'rgba(255,255,255,.04)'},ticks:{color:'#555870',font:{size:9}}}}}),
    ...cfg.options}});
}

function init(){

    const yd=data.filter(r=>r.month.startsWith(y));

      tot:yd.reduce((s,r)=>s+(r.totalRevenue||0),0),
      oc:yd.reduce((s,r)=>s+(r.ownerclan||0),0),

    };

  function yoyB(cur,prev,prevMonths){
    if(!prev||prevMonths<12)return '';
    const p=(cur-prev)/prev*100;
    return`<span class="ys-badge ${p>=0?'ys-up':'ys-dn'}">${p>=0?'+':''}${p.toFixed(0)}%</span>`;
  }
  function sh(v,t){return t>0?`<span style="font-size:10px;color:var(--text3);margin-left:2px;">${(v/t*100).toFixed(0)}%</span>`:''}

    <tbody>${yData.map((d,i)=>{
      const prev=i>0?yData[i-1]:null;
      return`<tr>
        <td>${d.year}년 <span style="font-size:10px;color:var(--text3);">${d.months}개월</span></td>
        <td style="color:var(--text);font-weight:500;">${fmtM(d.tot)}원 ${yoyB(d.tot,prev?.tot,prev?.months)}</td>

  // ── 사입 분석 ──
  const pur=PUR.sort((a,b)=>a.month.localeCompare(b.month));
